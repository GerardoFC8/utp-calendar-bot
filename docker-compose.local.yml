# For local development: docker compose -f docker-compose.yml -f docker-compose.local.yml up
version: '3.8'

services:
  bot:
    build:
      context: .
      target: builder
    command: npx tsx watch src/index.ts
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
