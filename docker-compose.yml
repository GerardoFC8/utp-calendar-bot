version: '3.8'

services:
  bot:
    build: .
    restart: always
    env_file: .env
    volumes:
      - bot-data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      update_config:
        order: stop-first
        delay: 5s
    labels:
      - "dokploy.enable=true"

volumes:
  bot-data:
    driver: local
